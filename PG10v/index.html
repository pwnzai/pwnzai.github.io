<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Win98 RSVP</title>
    <link rel="stylesheet" href="https://unpkg.com/98.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sixtyfour+Convergence&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <canvas id="fireworksCanvas" class="fireworks-canvas" aria-hidden="true"></canvas>
    <main class="site" id="app">
      <section class="view center" id="loginView" aria-label="Sign in">
        <div class="window login-window" role="group" aria-label="Sign in window">
          <div class="title-bar">
            <div class="title-bar-text">Sign In</div>
            <div class="title-bar-controls" aria-hidden="true">
              <button aria-label="Minimize"></button>
              <button aria-label="Maximize"></button>
              <button aria-label="Close"></button>
            </div>
          </div>
          <div class="window-body">
            <p class="lede">Enter the password to continue.</p>
            <div class="field-row-stacked">
              <label for="passwordInput">Password</label>
              <input
                id="passwordInput"
                name="password"
                type="password"
                autocomplete="off"
                inputmode="text"
              />
            </div>
            <div class="field-row buttons">
              <button type="button" id="loginButton">Log in</button>
            </div>
          </div>
        </div>
      </section>

      <dialog id="deniedDialog" aria-labelledby="deniedTitle">
        <div class="window denied-window" role="document">
          <div class="title-bar">
            <div class="title-bar-text" id="deniedTitle">ACCESS DENIED</div>
            <div class="title-bar-controls" aria-hidden="true">
              <button aria-label="Close"></button>
            </div>
          </div>
          <div class="window-body">
            <p>ACCESS DENIED</p>
            <div class="field-row buttons">
              <button type="button" id="deniedOkButton">OK</button>
            </div>
          </div>
        </div>
      </dialog>
    </main>

    <script src="assets/app.js" defer></script>
    <script src="assets/fireworks.js" defer></script>
  </body>
</html>
